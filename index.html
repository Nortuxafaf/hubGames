<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Game Hub</title>
    <style>
        :root {
            --bg-app: #0f172a; /* Fundo principal escuro */
            --card-bg: #1e293b; /* Fundo dos cartões */
            --text-main: #f8fafc;
            --text-sub: #94a3b8;
            --accent: #38bdf8; /* Cor de destaque (Azul claro) */
            --touch-highlight: #0284c7;
        }

        /* Reset básico e remoção do highlight azul nativo ao tocar em links no mobile */
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent; 
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #000; /* Fundo preto caso seja aberto no PC */
            margin: 0;
            display: flex;
            justify-content: center;
            height: 100vh;
        }

        /* Container que simula a tela do celular (segura o layout se abrir no PC) */
        #mobile-app {
            width: 100%;
            max-width: 480px; 
            background-color: var(--bg-app);
            height: 100%;
            overflow-y: auto;
            position: relative;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
        }

        header {
            background-color: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(10px); /* Efeito de vidro borrado */
            position: sticky;
            top: 0;
            padding: 24px 20px;
            text-align: center;
            border-bottom: 1px solid #334155;
            z-index: 10;
        }

        h1 {
            margin: 0;
            font-size: 1.4rem;
            color: var(--text-main);
            font-weight: 700;
            letter-spacing: 1px;
        }

        .subtitle {
            margin: 4px 0 0 0;
            font-size: 0.8rem;
            color: var(--accent);
            text-transform: uppercase;
            font-weight: bold;
        }

        .game-list {
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        /* Estilo dos botões/cartões */
        .game-card {
            display: flex;
            align-items: center;
            background-color: var(--card-bg);
            border-radius: 20px;
            padding: 16px;
            text-decoration: none;
            transition: transform 0.1s, background-color 0.1s;
        }

        /* Efeito ao tocar na tela (substitui o hover do PC) */
        .game-card:active {
            background-color: var(--touch-highlight);
            transform: scale(0.96); /* Dá uma leve encolhida ao tocar */
        }

        .icon-box {
            width: 64px;
            height: 64px;
            background-color: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2rem;
            margin-right: 16px;
            flex-shrink: 0;
        }

        .game-info {
            flex-grow: 1;
        }

        .game-title {
            color: var(--text-main);
            font-size: 1.15rem;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .game-desc {
            color: var(--text-sub);
            font-size: 0.85rem;
            line-height: 1.3;
        }

        .play-icon {
            color: var(--accent);
            font-size: 1.2rem;
            padding-left: 10px;
            opacity: 0.8;
        }
    </style>
</head>
<body>

    <div id="mobile-app">
        <header>
            <h1>🕹️ Game Hub</h1>
            <p class="subtitle">Escolha seu jogo</p>
        </header>

        <main class="game-list">
            <a href="games/tictac.html" class="game-card">
                <div class="icon-box">❌</div>
                <div class="game-info">
                    <div class="game-title">Tic-Tac-Toe</div>
                    <div class="game-desc">O clássico jogo da velha.</div>
                </div>
                <div class="play-icon">▶</div>
            </a>

            <a href="games/caracara.html" class="game-card">
                <div class="icon-box">🕵️‍♂️</div>
                <div class="game-info">
                    <div class="game-title">Cara a Cara</div>
                    <div class="game-desc">Descubra o personagem!</div>
                </div>
                <div class="play-icon">▶</div>
            </a>

            <a href="games/senha.html" class="game-card">
                <div class="icon-box">🔐</div>
                <div class="game-info">
                    <div class="game-title">Senha</div>
                    <div class="game-desc">Quebre o código secreto.</div>
                </div>
                <div class="play-icon">▶</div>
            </a>

          <a href="games/genius.html" class="game-card">
                <div class="icon-box">🟦🟥</div>
                <div class="game-info">
                    <div class="game-title">Genium</div>
                    <div class="game-desc">Decore as cores</div>
                </div>
                <div class="play-icon">▶</div>
            </a>

        </main>
    </div>

</body>
</html>
